site_name: AETHERIA RO
site_url: https://aetheriaofficial.github.io/AetheriaRO/

theme:
  name: material
  language: th
  palette:
    - scheme: default
      primary: blue
      accent: blue
  features:
    - navigation.instant

extra_css:
  - assets/ro-portal.css

nav:
  - หน้าแรก: index.md

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition

plugins:
  - search
